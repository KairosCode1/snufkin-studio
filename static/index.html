<style>
  /* ── Frameless window: drag + custom controls ── */
  #drag-region {
    -webkit-app-region: drag;
    position: fixed; top: 0; left: 0; right: 138px; height: 32px;
    z-index: 99999; pointer-events: auto;
  }
  #win-controls {
    -webkit-app-region: no-drag;
    position: fixed; top: 0; right: 0; height: 32px;
    display: flex; align-items: stretch; z-index: 99999;
  }
  #win-controls button {
    -webkit-app-region: no-drag;
    width: 46px; height: 32px; border: none; background: transparent;
    color: rgba(255,255,255,0.55); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; transition: background 0.12s, color 0.12s;
    outline: none;
  }
  #win-controls button:hover { background: rgba(255,255,255,0.08); color: #fff; }
  #btn-close:hover { background: #c42b1c !important; color: #fff !important; }
  button, a, input, select, [role="button"] { -webkit-app-region: no-drag; }
</style>

          "accent-bright": "#6872D9",

      },

</script>

<style>
  html, body { background: #050506; }
  body {
    margin: 0;
    font-family: 'Inter', system-ui, sans-serif;
    color: #EDEDEF;
    -webkit-font-smoothing: antialiased;
  }
  /* Eliminar barra lateral de scroll */
  ::-webkit-scrollbar { display: none; }
  html { scrollbar-width: none; }
  /* Espacio para la barra de tÃ­tulo oscura de Electron (36px) */
  /* En navegador normal este padding no hace daÃ±o */
  body.electron-app { padding-top: 36px; }

  /* â”€â”€ Noise texture â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */
  .noise-layer {
    position: absolute;
    inset: 0;
    pointer-events: none;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-repeat: repeat;
    background-size: 128px 128px;
    opacity: 0.018;
  }

  /* â”€â”€ Grid overlay â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */
  .grid-layer {
    position: absolute;
    inset: 0;
    pointer-events: none;
    background-image:
      linear-gradient(rgba(255,255,255,0.022) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.022) 1px, transparent 1px);
    background-size: 64px 64px;
  }

  /* â”€â”€ Blob float animations â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */
  @keyframes blob-drift-1 {
    0%,  100% { transform: translate(0px,   0px)  rotate(0deg);   }
    33%        { transform: translate(-24px, -18px) rotate(1.2deg); }
    66%        { transform: translate(18px,  -36px) rotate(-0.8deg); }
  }
  @keyframes blob-drift-2 {
    0%,  100% { transform: translate(0px,  0px)  rotate(0deg); }
    50%        { transform: translate(32px, -24px) rotate(2deg);  }
  }
  @keyframes blob-drift-3 {
    0%,  100% { transform: translate(0px,   0px) scale(1);    }
    50%        { transform: translate(-16px, 18px) scale(1.06); }
  }
  @keyframes blob-pulse {
    0%,  100% { opacity: 0.08; }
    50%        { opacity: 0.16; }
  }

  /* â”€â”€ Ambient blob shapes â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */
  .blob-1 {
    position: absolute;
    width: 900px; height: 900px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(94,106,210,0.22) 0%, transparent 68%);
    filter: blur(130px);
    top: -200px; left: 50%; transform: translateX(-50%);
    animation: blob-drift-1 11s ease-in-out infinite;
    pointer-events: none;
  }
  .blob-2 {
    position: absolute;
    width: 560px; height: 740px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(99,102,241,0.14) 0%, transparent 68%);
    filter: blur(100px);
    top: 8%; left: -80px;
    animation: blob-drift-2 13s ease-in-out infinite;
    pointer-events: none;
  }
  .blob-3 {
    position: absolute;
    width: 480px; height: 580px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(139,92,246,0.11) 0%, transparent 68%);
    filter: blur(90px);
    top: 18%; right: -60px;
    animation: blob-drift-3 9s ease-in-out infinite;
    pointer-events: none;
  }
  .blob-4 {
    position: absolute;
    width: 380px; height: 380px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(94,106,210,0.09) 0%, transparent 68%);
    filter: blur(70px);
    bottom: 8%; left: 28%;
    animation: blob-pulse 7s ease-in-out infinite;
    pointer-events: none;
  }

  /* â”€â”€ Glass surface system â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */
  .liquid-glass {
    background: linear-gradient(to bottom, rgba(255,255,255,0.065), rgba(255,255,255,0.025));
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.07);
    box-shadow:
      0 0 0 1px rgba(255,255,255,0.05),
      0 2px 20px rgba(0,0,0,0.40),
      0 0 40px rgba(0,0,0,0.20);
    position: relative;
    overflow: hidden;
  }
  .liquid-glass::before {
    content: "";
    position: absolute;
    top: 0; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.12) 50%, transparent 100%);
    pointer-events: none;
  }

  .liquid-glass-strong {
    background: linear-gradient(to bottom, rgba(255,255,255,0.07), rgba(255,255,255,0.02));
    backdrop-filter: blur(40px);
    -webkit-backdrop-filter: blur(40px);
    border: 1px solid rgba(255,255,255,0.07);
    box-shadow:
      0 0 0 1px rgba(255,255,255,0.05),
      0 4px 30px rgba(0,0,0,0.50),
      0 0 60px rgba(0,0,0,0.30),
      0 0 100px rgba(94,106,210,0.04);
    position: relative;
    overflow: hidden;
  }
  .liquid-glass-strong::before {
    content: "";
    position: absolute;
    top: 0; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.10) 50%, transparent 100%);
    pointer-events: none;
  }

  video { will-change: opacity; }

  @keyframes aelios-pulse {
    0%, 100% { opacity: 1;   transform: scale(1);   }
    50%       { opacity: 0.3; transform: scale(0.58); }
  }
</style>

<script>
  (function () {
    const origError = console.error;
    console.error = function () {
      const msg = arguments[0];
      if (typeof msg === "string" && msg.indexOf("unique \"key\" prop") !== -1) return;
      return origError.apply(console, arguments);
    };
  })();
</script>

<body>
<div id="drag-region"></div>
<div id="win-controls">
  <button id="btn-min"   title="Minimizar"         onclick="window.electronAPI?.minimizeWindow()">
    <svg width="10" height="1"  viewBox="0 0 10 1"  fill="none"><line x1="0" y1="0.5" x2="10" y2="0.5" stroke="currentColor" stroke-width="1.2"/></svg>
  </button>
  <button id="btn-max"   title="Maximizar/Restaurar" onclick="window.electronAPI?.maximizeWindow()">
    <svg width="10" height="10" viewBox="0 0 10 10" fill="none"><rect x="0.6" y="0.6" width="8.8" height="8.8" rx="0.5" stroke="currentColor" stroke-width="1.2"/></svg>
  </button>
  <button id="btn-close" title="Cerrar"            onclick="window.electronAPI?.closeWindow()">
    <svg width="10" height="10" viewBox="0 0 10 10" fill="none"><line x1="1" y1="1" x2="9" y2="9" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/><line x1="9" y1="1" x2="1" y2="9" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
  </button>
</div>
<div id="root"></div>
