<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>SnufkinStudio</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 460px; height: 300px;
    background: transparent;
    overflow: hidden;
    font-family: 'Segoe UI', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  .card {
    width: 100%;
    height: 100%;
    background: linear-gradient(145deg, #0e0e14 0%, #050508 100%);
    border-radius: 16px;
    border: 1px solid rgba(255,255,255,0.07);
    box-shadow:
      0 0 0 1px rgba(255,255,255,0.04),
      0 24px 64px rgba(0,0,0,0.90),
      0 0 120px rgba(94,106,210,0.08);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0;
    position: relative;
    overflow: hidden;
  }

  /* Subtle top-edge highlight */
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.10) 50%, transparent 100%);
  }

  /* Ambient blob */
  .blob {
    position: absolute;
    width: 320px; height: 320px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(94,106,210,0.18) 0%, transparent 70%);
    filter: blur(60px);
    top: -100px; left: 50%; transform: translateX(-50%);
    pointer-events: none;
  }

  .logo {
    font-family: Georgia, 'Times New Roman', serif;
    font-style: italic;
    font-size: 52px;
    font-weight: 600;
    letter-spacing: -1px;
    line-height: 1;
    user-select: none;
    position: relative;
    z-index: 1;
  }
  .logo .w {
    color: #EDEDEF;
    text-shadow: 0 0 40px rgba(255,255,255,0.18);
  }
  .logo .b {
    color: #7C85E0;
    text-shadow: 0 0 40px rgba(124,133,224,0.55);
  }

  .tagline {
    margin-top: 10px;
    font-size: 12px;
    font-weight: 400;
    color: #4a4e5a;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    position: relative;
    z-index: 1;
  }

  .dots-wrap {
    margin-top: 36px;
    display: flex;
    gap: 8px;
    align-items: center;
    position: relative;
    z-index: 1;
  }
  .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #5E6AD2;
    animation: pulse 1.4s ease-in-out infinite;
  }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes pulse {
    0%, 100% { opacity: 0.25; transform: scale(0.7); }
    50%       { opacity: 1;    transform: scale(1);   }
  }

  .status {
    margin-top: 14px;
    font-size: 11px;
    color: #383c47;
    letter-spacing: 0.04em;
    position: relative;
    z-index: 1;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="blob"></div>
    <div class="logo">
      <span class="w">Snufkin</span><span class="b">Studio</span>
    </div>
    <div class="tagline">Auto Captions</div>
    <div class="dots-wrap">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
    <div class="status" id="status">Iniciando servidor…</div>
  </div>

  <script>
    const messages = [
      'Iniciando servidor…',
      'Cargando modelos…',
      'Preparando interfaz…',
      'Casi listo…',
    ];
    let i = 0;
    const el = document.getElementById('status');
    setInterval(() => {
      i = Math.min(i + 1, messages.length - 1);
      el.textContent = messages[i];
    }, 3500);
  </script>
</body>
</html>
